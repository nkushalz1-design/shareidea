<!-- SEARCH BOX -->
<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search ShareIdea..." />
    <button id="searchBtn">↑</button>
</div>

<!-- TAGS -->
<div class="tags">
    <div class="tag">✨ All</div>
    <div class="tag">🚀 Discovery</div>
    <div class="tag">💡 Idea</div>
    <div class="tag">🔮 Future</div>
    <div class="tag">👑 Golden Rule</div>
</div>

<style>
body{
    background:#0f172a;
    font-family:Arial, sans-serif;
    color:white;
}

/* SEARCH BOX */
.search-container{
    width:750px;
    max-width:95%;
    margin:20px auto;
    display:flex;
    align-items:center;
    background:#1e293b;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:50px;
    padding:8px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.search-container input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:16px;
    padding:12px 18px;
}

.search-container input::placeholder{
    color:#94a3b8;
}

.search-container button{
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:#6366f1;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.search-container button:hover{
    transform:scale(1.08);
    background:#7c82ff;
}

/* TAGS */
.tags{
    display:flex;
    gap:15px;
    margin:25px auto;
    width:95%;
    flex-wrap:wrap;
    justify-content:center;
}

.tag{
    padding:12px 25px;
    background:#1e293b;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:40px;
    transition:0.3s;
    cursor:pointer;
}

.tag:hover{
    background:#334155;
    transform:translateY(-2px);
}

/* IDEA CARDS */
.card{
    transition:0.3s;
}
</style>

<script>
// SEARCH FUNCTION
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");

function searchIdea(){

    let value = searchInput.value.toLowerCase().trim();

    // SELECT ALL IDEA CARDS
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {

        let text = card.innerText.toLowerCase();

        if(text.includes(value)){
            card.style.display = "block";
        }else{
            card.style.display = "none";
        }

    });
}

// BUTTON CLICK
searchBtn.addEventListener("click", searchIdea);

// LIVE SEARCH
searchInput.addEventListener("keyup", searchIdea);

// TAG SEARCH
document.querySelectorAll(".tag").forEach(tag => {

    tag.addEventListener("click", () => {

        let value = tag.innerText.toLowerCase()
            .replace("✨","")
            .replace("🚀","")
            .replace("💡","")
            .replace("🔮","")
            .replace("👑","")
            .trim();

        searchInput.value = value === "all" ? "" : value;

        searchIdea();
    });

});
</script>
