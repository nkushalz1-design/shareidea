<!-- SEARCH BOX -->
<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search ShareIdea..." />
    <button id="searchBtn">↑</button>
</div>

<!-- TAGS -->
<div class="tags">
    <div class="tag">Discovery</div>
    <div class="tag">Idea</div>
    <div class="tag">Future</div>
    <div class="tag">Golden Rule</div>
</div>

<!-- RESULT -->
<div id="result"></div>

<style>
body{
    background:#0f172a;
    font-family:Arial, sans-serif;
    color:white;
    padding:40px;
}

/* SEARCH BOX */
.search-container{
    width:800px;
    max-width:100%;
    margin:auto;
    display:flex;
    align-items:center;
    background:#1e293b;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:50px;
    padding:8px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.search-container input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:16px;
    padding:12px 18px;
}

.search-container input::placeholder{
    color:#94a3b8;
}

.search-container button{
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:#6366f1;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.search-container button:hover{
    transform:scale(1.08);
}

/* TAGS */
.tags{
    display:flex;
    gap:15px;
    margin-top:30px;
    flex-wrap:wrap;
}

.tag{
    padding:12px 25px;
    background:#1e293b;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:40px;
    transition:0.3s;
}

.tag:hover{
    background:#334155;
}

/* RESULT */
#result{
    margin-top:30px;
    font-size:22px;
    font-weight:bold;
}
</style>

<script>
const allowedWords = [
    "discovery",
    "idea",
    "future",
    "golden rule"
];

const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const result = document.getElementById("result");

function searchIdea(){
    let value = searchInput.value.toLowerCase().trim();

    if(allowedWords.includes(value)){
        result.innerHTML = "✅ Found: " + value;
    }else{
        result.innerHTML = "❌ Only Discovery, Idea, Future and Golden Rule allowed";
    }
}

searchBtn.addEventListener("click", searchIdea);

searchInput.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        searchIdea();
    }
});
</script>
